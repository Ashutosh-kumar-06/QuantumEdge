<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://quantumedge.duckdns.org" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantumEdge IDE</title>
    <style>
      #splash-screen {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      .quantum-loader {
        width: 60px; height: 60px;
        border: 4px solid #38bdf8;
        border-top: 4px solid transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .splash-text {
        margin-top: 20px; color: #f8fafc; font-family: sans-serif; font-weight: bold; font-size: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div id="splash-screen">
      <div class="quantum-loader"></div>
      <div class="splash-text">Initializing Quantum Environment...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
