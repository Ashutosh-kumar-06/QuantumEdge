events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name quantumedge.duckdns.org;
        
        # This is needed for certbot to verify the domain initially
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name quantumedge.duckdns.org;

        # SSL Certificates (Managed by Certbot)
        ssl_certificate /etc/letsencrypt/live/quantumedge.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/quantumedge.duckdns.org/privkey.pem;

        # Recommended SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Use Docker's internal DNS resolver to dynamically resolve container IPs
        resolver 127.0.0.11 valid=30s;

        # Route API and WebSockets to the Backend
        location /api/ {
            set $api_upstream http://api-gateway:4000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /socket.io/ {
            set $ws_upstream http://api-gateway:4000;
            proxy_pass $ws_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /yjs/ {
            set $yjs_upstream http://yjs-server:1234;
            proxy_pass $yjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Route everything else to the Frontend
        location / {
            set $frontend_upstream http://frontend:5173;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
